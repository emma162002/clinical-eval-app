{% extends "base.html" %}
{% block title %}Profile – Clinical Evaluation{% endblock %}
{% block header_title %}Profile{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto bg-white shadow rounded-lg p-6 border border-gray-100">
  <h2 class="text-xl font-semibold text-gray-900 mb-4">Your profile</h2>
  <form method="post" action="/profile" class="space-y-4">
    <div>
      <label for="full_name" class="block text-sm font-medium text-gray-700 mb-1">Full name</label>
      <input
        type="text"
        id="full_name"
        name="full_name"
        value="{{ current_user.full_name or '' }}"
        class="block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm"
      />
    </div>
    <div>
      <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input
        type="email"
        id="email"
        name="email"
        value="{{ current_user.email or '' }}"
        class="block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm"
      />
    </div>
    <div>
      <label for="institution" class="block text-sm font-medium text-gray-700 mb-1">Institution / site</label>
      <input
        type="text"
        id="institution"
        name="institution"
        value="{{ current_user.institution or '' }}"
        class="block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm"
      />
    </div>
    <div>
      <label for="notes" class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
      <textarea
        id="notes"
        name="notes"
        rows="3"
        class="block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm"
      >{{ current_user.notes or '' }}</textarea>
    </div>
    <div class="flex items-center justify-end gap-3 pt-2">
      <a href="{{ request.url_for('home') }}" class="text-sm text-gray-500 hover:text-gray-700">Cancel</a>
      <button type="submit" class="inline-flex items-center px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-md hover:bg-blue-700">Save changes</button>
    </div>
  </form>
</div>
{% endblock %}
